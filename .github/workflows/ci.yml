# Continuous integration: the safety net described in WORKPLAN.md §1.4.
# Every push and pull request must pass lint, typecheck, unit tests, and build.
# End-to-end (Playwright) tests run as a separate job so a browser hiccup never
# blocks the fast feedback of the core checks.
name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  check:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  e2e:
    name: End-to-end (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - run: npm run e2e
